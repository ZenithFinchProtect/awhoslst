name = "awhoslst"
main = "worker.js"
compatibility_date = "2024-12-01"
workers_dev = true
preview_urls = true

routes = [
  { pattern = "nordicnfas.com", custom_domain = true }
]

[assets]
directory = "./public"
binding = "ASSETS"

# ── Stock Discord bot ──
# Runs every minute; the scheduled handler only posts when the interval
# configured in the panel has elapsed (so any interval, e.g. 60 min, works).
[triggers]
crons = ["* * * * *"]

# KV namespace that stores the stock-bot config (webhook URL, interval, groups…).
# Create it once with:  wrangler kv namespace create STOCK_BOT
# then paste the returned id below (and a preview_id for `wrangler dev`).
[[kv_namespaces]]
binding = "STOCK_BOT"
id = "14234c4109ef4e23957f850f64e6880d"

# Panel password — set via: wrangler secret put PANEL_PASSWORD
# The worker falls back to a default if the secret is not set.
